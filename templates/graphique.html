<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Températures Paris — Google LineChart</title>
  <script type="text/javascript" src="https://www.gstatic.com/charts/loader.js"></script>
  <style>
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; margin: 24px; }
    #chart { width: 100%; height: 520px; }
    #status { margin-top: 12px; white-space: pre-wrap; }
  </style>
</head>
<body>
  <h1>Températures horaires — Paris</h1>
  <div id="chart"></div>
  <div id="status"></div>

  <script>
    // Charger Google Charts
    google.charts.load('current', { packages: ['corechart'] });
    google.charts.setOnLoadCallback(init);

    async function init() {
      try {
        // Appel à l'API /paris
        const rows = await fetch('/paris').then(r => r.json());

        // Transformer les données JSON en [Date, Number]
        const formattedRows = rows.map(p => {
          const [datePart, timePart] = p.datetime.split('T');
          const [y, m, d] = datePart.split('-').map(Number);
          const [h, min] = timePart.split(':').map(Number);
          return [new Date(y, m-1, d, h, min), Number(p.temperature_c)];
        });

        drawChart(formattedRows);

        document.getElementById('status').textContent = `OK — ${formattedRows.length} points chargés depuis /paris`;

        // Redessiner le graphique si la fenêtre est redimensionnée
        window.addEventListener('resize', () => drawChart(formattedRows));

      } catch (e) {
        document.getElementById('status').textContent = 'Erreur: ' + e.message;
        console.error(e);
      }
    }

    function drawChart(rows) {
      const data = new google.visualization.DataTable();
      data.addColumn('datetime', 'Date/Heure');
      data.addColumn('number', 'Température (°C)');
      data.addRows(rows);

      const options = {
        title: 'Température à Paris (horaire)',
        legend: { position: 'bottom' },
        hAxis: { title: 'Date/Heure', format: 'dd/MM HH:mm' },
        vAxis: { title: '°C' },
        explorer: { actions: ['dragToZoom', 'rightClickToReset'] }
      };

      const chart = new google.visualization.LineChart(document.getElementById('chart'));
      chart.draw(data, options);
    }
  </script>
</body>
</html>
