<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Températures Paris — Histogramme</title>
  <script type="text/javascript" src="https://www.gstatic.com/charts/loader.js"></script>
  <style>
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; margin: 24px; }
    #chart { width: 100%; height: 500px; }
    #status { margin-top: 12px; white-space: pre-wrap; }
  </style>
</head>
<body>
  <h1>Prévisions météo Paris — Histogramme</h1>
  <div id="chart"></div>
  <div id="status"></div>

  <script>
    google.charts.load('current', { packages: ['corechart'] });
    google.charts.setOnLoadCallback(init);

    async function init() {
      try {
        const rows = await fetch('/paris').then(r => r.json());

        // Calculer la température moyenne par jour
        const dailyTemps = {};
        rows.forEach(p => {
          const date = p.datetime.split('T')[0];
          if (!dailyTemps[date]) dailyTemps[date] = [];
          dailyTemps[date].push(Number(p.temperature_c));
        });

        const dailyAverage = Object.entries(dailyTemps).map(([date, temps]) => {
          const avg = temps.reduce((a,b) => a+b, 0) / temps.length;
          return [date, avg];
        });

        drawChart(dailyAverage);
        document.getElementById('status').textContent = `OK — ${dailyAverage.length} jours chargés depuis /paris`;

      } catch (e) {
        document.getElementById('status').textContent = 'Erreur: ' + e.message;
        console.error(e);
      }
    }

    function drawChart(rows) {
      const data = new google.visualization.DataTable();
      data.addColumn('string', 'Date');
      data.addColumn('number', 'Température moyenne (°C)');
      data.addRows(rows);

      const options = {
        title: 'Températures moyennes à Paris (7 jours)',
        legend: { position: 'none' },
        hAxis: { title: 'Date' },
        vAxis: { title: '°C' },
        colors: ['#1f77b4']
      };

      const chart = new google.visualization.ColumnChart(document.getElementById('chart'));
      chart.draw(data, options);
    }
  </script>
</body>
</html>
