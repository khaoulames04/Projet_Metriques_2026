<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Températures Paris — Histogramme</title>
  <script type="text/javascript" src="https://www.gstatic.com/charts/loader.js"></script>
  <style>
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; margin: 24px; }
    #chart { width: 100%; height: 500px; }
    #status { margin-top: 12px; white-space: pre-wrap; }
  </style>
</head>
<body>
  <h1>Prévisions météo Paris — Histogramme</h1>
  <div id="chart"></div>
  <div id="status"></div>

  <script>
    google.charts.load('current', { packages: ['corechart'] });
    google.charts.setOnLoadCallback(init);

    async function init() {
      try {
        const rows = await fetch('/paris').then(r => r.json());

        // On prend juste les 7 premiers jours (première mesure par jour)
        const daily = [];
        const seenDates = new Set();
        for (let i = 0; i < rows.length; i++) {
          const date = rows[i].datetime.split('T')[0];
          if (!seenDates.has(date)) {
            seenDates.add(date);
            daily.push([date, Number(rows[i].temperature_c)]);
          }
          if (daily.length >= 7) break;  // On ne garde que 7 jours
        }

        drawChart(daily);
        document.getElementById('status').textContent = `OK — ${daily.length} jours chargés depuis /paris`;

      } catch (e) {
        document.getElementById('status').textContent = 'Erreur: ' + e.message;
        console.error(e);
      }
    }

    function drawChart(rows) {
      const data = new google.visualization.DataTable();
      data.addColumn('string', 'Date');
      data.addColumn('number', 'Température (°C)');
      data.addRows(rows);

      const options = {
        title: 'Températures prévues à Paris (7 jours)',
        legend: { position: 'none' },
        hAxis: { title: 'Date' },
        vAxis: { title: '°C' },
        colors: ['#1f77b4']
      };

      const chart = new google.visualization.ColumnChart(document.getElementById('chart'));
      chart.draw(data, options);
    }
  </script>
</body>
</html>
